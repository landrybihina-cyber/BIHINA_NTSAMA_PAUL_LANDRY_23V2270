<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EtuData — Collecte des données Étudiants</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts + styles perso -->
    <!-- <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> -->
     

</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4 d-flex align-items-center gap-3">

        <a class="navbar-brand" href="/">EtuData</a>

        <div class="d-flex align-items-center gap-1 ms-auto flex-wrap">
            <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}"
               href="/">📝 Saisie</a>
            <a class="nav-link {% if request.endpoint == 'main.liste' %}active{% endif %}"
               href="/liste">👥 Liste</a>
            <a class="nav-link {% if request.endpoint == 'main.stats' %}active{% endif %}"
               href="/stats">📊 Statistiques</a>
            <a class="nav-link export-link" href="/export/csv">⬇ CSV</a>
            <a class="nav-link export-link" href="/export/excel">⬇ Excel</a>
        </div>

    </div>
</nav>

<!-- ===== FLASH MESSAGES ===== -->
<div class="container mt-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} animate-fadeup">{{ message }}</div>
      {% endfor %}
    {% endwith %}
</div>

<!-- ===== CONTENU ===== -->
{% block content %}{% endblock %}

<!-- ===== FOOTER ===== -->
<footer>
    <div class="container">
        EtuData &copy; 2026 — Application de collecte de données étudiants
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
